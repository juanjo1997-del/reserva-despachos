<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserva de Despachos — CEDIA</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#e8e4dc;color:#111;min-height:100vh;padding:1.5rem}
  .app{max-width:980px;margin:0 auto;background:#fff;border-radius:12px;border:2px solid #111;overflow:hidden;box-shadow:4px 4px 0 #111}
  .hdr{padding:1.25rem 1.5rem;border-bottom:2px solid #111;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;background:#1a3a5c}
  .hdr-left h1{font-size:17px;font-weight:700;color:#fff;letter-spacing:.3px}
  .hdr-left p{font-size:12px;color:#a8c4e0;margin-top:2px}
  .nav{display:flex;align-items:center;gap:6px}
  .nav button{background:#fff;border:2px solid #fff;border-radius:8px;padding:5px 13px;font-size:13px;font-weight:600;cursor:pointer;color:#1a3a5c;transition:all .15s}
  .nav button:hover{background:#e8f0fb;border-color:#e8f0fb}
  .week-label{font-size:13px;font-weight:600;color:#fff;min-width:130px;text-align:center}
  .body{padding:1.25rem 1.5rem 1.5rem}
  .tabs{display:flex;gap:8px;margin-bottom:1.25rem}
  .tab{padding:7px 18px;border-radius:8px;border:2px solid #111;font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:#111;transition:all .15s}
  .tab.active{background:#1a3a5c;border-color:#1a3a5c;color:#fff}
  .tab:hover:not(.active){background:#e8f0fb}
  .grid-wrap{overflow-x:auto;border:2px solid #111;border-radius:8px}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{padding:9px 4px;text-align:center;font-weight:700;font-size:12px;color:#111;border-bottom:2px solid #111;background:#f0ede6}
  th.tc{width:52px;border-right:2px solid #111}
  td{border:1px solid #bbb;height:40px;vertical-align:middle;padding:3px 4px;transition:background .1s}
  td.time{font-size:11px;font-weight:700;color:#444;text-align:right;padding-right:8px;cursor:default;background:#f7f5f0;border-right:2px solid #111;white-space:nowrap}
  td.blocked{background:#e8e4dc;cursor:not-allowed;position:relative;border:1px solid #bbb}
  td.blocked::after{content:"descanso";font-size:9px;font-weight:600;color:#888;position:absolute;bottom:3px;right:5px;text-transform:uppercase;letter-spacing:.3px}
  td.free{cursor:pointer;background:#fff}
  td.free:hover{background:#ddeeff;border-color:#1a3a5c}
  td.booked{cursor:pointer;position:relative}
  td.today-col{background:#fffbee}
  td.today-col.free:hover{background:#fff3c0}
  th.today-th{background:#1a3a5c;color:#fff}
  .pill{display:block;padding:4px 7px;border-radius:5px;font-size:11px;font-weight:700;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1.4;border:1.5px solid rgba(0,0,0,.25)}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000}
  .modal{background:#fff;border-radius:12px;border:2px solid #111;padding:1.5rem;width:340px;max-width:95vw;box-shadow:4px 4px 0 #111}
  .modal h3{font-size:16px;font-weight:700;margin-bottom:.25rem;color:#111}
  .modal-sub{font-size:12px;font-weight:600;color:#555;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:2px solid #e0ddd6}
  .fr{margin-bottom:.875rem}
  .fr label{display:block;font-size:12px;font-weight:700;color:#111;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
  .fr input,.fr select,.fr textarea{width:100%;padding:9px 11px;font-size:13px;border:2px solid #111;border-radius:8px;background:#fff;color:#111;outline:none;transition:border .15s;font-weight:500}
  .fr input:focus,.fr select:focus,.fr textarea:focus{border-color:#1a3a5c;box-shadow:0 0 0 3px rgba(26,58,92,.15)}
  .fr textarea{resize:vertical;min-height:60px}
  .btn-row{display:flex;gap:8px;margin-top:1.25rem}
  .btn{flex:1;padding:10px;border-radius:8px;font-size:13px;cursor:pointer;border:2px solid #111;font-weight:700;transition:all .15s}
  .btn-primary{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
  .btn-primary:hover{background:#0f2840}
  .btn-danger{color:#a32d2d;border-color:#a32d2d;background:#fff}
  .btn-danger:hover{background:#fcebeb}
  .btn-cancel{background:#fff;color:#111}
  .btn-cancel:hover{background:#f0ede6}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:1.25rem;padding-top:1rem;border-top:2px solid #111}
  .li{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#111}
  .ld{width:16px;height:16px;border-radius:4px;border:2px solid #111;flex-shrink:0}
  .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1a3a5c;color:#fff;padding:.75rem 1.25rem;border-radius:8px;border:2px solid #fff;font-size:13px;font-weight:600;z-index:2000;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:2px 2px 0 #111}
  .toast.show{opacity:1}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid #ccc;border-top-color:#1a3a5c;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-row td{text-align:center;padding:2rem;color:#555;font-size:13px;font-weight:600}
  .err-banner{background:#fcebeb;border:2px solid #a32d2d;border-radius:8px;padding:.75rem 1rem;font-size:12px;font-weight:600;color:#a32d2d;margin-bottom:1rem;display:none}
</style>
</head>
<body>

<div class="app">
  <div class="hdr">
    <div class="hdr-left">
      <h1>Reserva de despachos</h1>
      <p>CEDIA · Cáritas Madrid</p>
    </div>
    <div class="nav">
      <button onclick="changeWeek(-1)">&#8592;</button>
      <span class="week-label" id="wlabel"></span>
      <button onclick="changeWeek(1)">&#8594;</button>
      <button onclick="goToday()" style="font-size:11px;padding:5px 10px">hoy</button>
    </div>
  </div>
  <div class="body">
    <div id="err-banner" class="err-banner"></div>
    <div class="tabs" id="tabs"></div>
    <div class="grid-wrap"><table id="grid"></table></div>
    <div class="legend">
      <div class="li"><div class="ld" style="background:#ddeeff;border-color:#1a3a5c"></div>libre</div>
      <div class="li"><div class="ld" style="background:#9fe1cb"></div>reservado</div>
      <div class="li"><div class="ld" style="background:#e8e4dc"></div>no disponible</div>
    </div>
  </div>
</div>

<div id="overlay" class="overlay" style="display:none">
  <div class="modal" id="modal-box"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyG3RV_Js3_uVXFo_25TjUWbnHka7p5p8sBZjwn4sKIu2AUkjy0W_8VrmS-KY4AOUyl/exec";

const DESPACHOS = [{id:2,label:"Despacho 2"},{id:4,label:"Despacho 4"},{id:5,label:"Despacho 5"}];

const PROFESIONALES = [
  {nombre:"Miguel Sánchez (Miki)", codigo:"PAI"},
  {nombre:"Bianca Trachedi",       codigo:"PS"},
  {nombre:"Juanjo",                codigo:"DIR"},
  {nombre:"Javier Ródenas",        codigo:"DIR2"},
  {nombre:"Raquel Martín",         codigo:"TS3"},
  {nombre:"Jorge Puente",          codigo:"TF1"},
  {nombre:"Lorena Chacón",         codigo:"TF2"}
];

const PCOLORS = [
  {bg:"#B5D4F4",fg:"#0C3566"},
  {bg:"#9FE1CB",fg:"#054535"},
  {bg:"#FAC775",fg:"#5a3200"},
  {bg:"#F4C0D1",fg:"#6b1a2e"},
  {bg:"#C0DD97",fg:"#254800"},
  {bg:"#D4BBEF",fg:"#3d1470"},
  {bg:"#F9D49B",fg:"#5a3800"}
];

const BLOCKED_5 = [{s:11*60+30,e:12*60+30},{s:15*60,e:16*60},{s:19*60,e:19*60+30}];
const START=9*60, END=20*60, SLOT=45;
const DAYS_SHORT=["Lun","Mar","Mié","Jue","Vie"];

let currentMonday = getMonday(new Date());
let currentDespacho = 2;
let bookings = {};
let loading = false;

function getMonday(d){
  const dt=new Date(d); const day=dt.getDay();
  const diff=dt.getDate()-day+(day===0?-6:1);
  dt.setDate(diff); dt.setHours(0,0,0,0); return dt;
}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function fmtDate(d){return d.toISOString().split('T')[0]}
function fmtDisplay(d){return d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'})}
function isToday(d){return fmtDate(d)===fmtDate(new Date())}
function timeStr(m){return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`}
function slotKey(despacho,dayIdx,slotIdx){return `${despacho}_${fmtDate(addDays(currentMonday,dayIdx))}_${slotIdx}`}
function isBlocked(despacho,slotIdx){
  if(despacho!==5) return false;
  const sm=START+slotIdx*SLOT, em=sm+SLOT;
  return BLOCKED_5.some(b=>sm<b.e&&em>b.s);
}
function profIndex(codigo){return PROFESIONALES.findIndex(p=>p.codigo===codigo)}

async function apiGet(params){
  const url=new URL(SCRIPT_URL);
  Object.entries(params).forEach(([k,v])=>url.searchParams.append(k,v));
  const res=await fetch(url.toString());
  if(!res.ok) throw new Error('Error '+res.status);
  return res.json();
}
async function apiPost(body){
  const res=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(body)});
  if(!res.ok) throw new Error('Error '+res.status);
  return res.json();
}
async function loadWeek(){
  loading=true; renderGrid();
  const monday=fmtDate(currentMonday), friday=fmtDate(addDays(currentMonday,4));
  try{
    const data=await apiGet({despacho:currentDespacho,monday,friday});
    bookings={};
    (data||[]).forEach(item=>{
      const key=`${item.despacho}_${item.fecha}_${item.slotIndex}`;
      bookings[key]={rowIndex:item.rowIndex,prof:item.profesional,persona:item.persona,obs:item.obs||'',hora:item.horaInicio};
    });
    hideError();
  }catch(e){showError('No se pudo conectar con Google Sheets. '+e.message);}
  loading=false; renderGrid();
}
async function saveBooking(key,data){
  const parts=key.split('_');
  const horaInicio=timeStr(START+parseInt(parts[2])*SLOT);
  try{
    const result=await apiPost({action:'save',despacho:parts[0],fecha:parts[1],slotIndex:parts[2],horaInicio,profesional:data.prof,persona:data.persona,obs:data.obs||''});
    bookings[key]={...data,rowIndex:result.rowIndex,hora:horaInicio};
    showToast('Cita guardada ✓');
  }catch(e){showError('Error al guardar: '+e.message);}
  closeModal(); renderGrid();
}
async function updateBooking(key,rowIndex,data){
  try{
    await apiPost({action:'update',rowIndex,profesional:data.prof,persona:data.persona,obs:data.obs||''});
    bookings[key]={...bookings[key],...data};
    showToast('Cita actualizada ✓');
  }catch(e){showError('Error al actualizar: '+e.message);}
  closeModal(); renderGrid();
}
async function deleteBooking(key,rowIndex){
  try{
    await apiPost({action:'delete',rowIndex});
    delete bookings[key];
    showToast('Cita eliminada');
  }catch(e){showError('Error al eliminar: '+e.message);}
  closeModal(); renderGrid();
}

function renderTabs(){
  document.getElementById('tabs').innerHTML=DESPACHOS.map(d=>
    `<button class="tab${d.id===currentDespacho?' active':''}" onclick="setDespacho(${d.id})">${d.label}</button>`
  ).join('');
}
function renderWeekLabel(){
  document.getElementById('wlabel').textContent=`${fmtDisplay(currentMonday)} – ${fmtDisplay(addDays(currentMonday,4))}`;
}
function renderGrid(){
  const slots=[];
  for(let m=START;m<END;m+=SLOT) slots.push(m);
  const t=document.getElementById('grid');
  if(loading){
    t.innerHTML=`<tr><td colspan="6" class="loading-row"><span class="spinner"></span>Cargando citas...</td></tr>`;
    return;
  }
  let html=`<tr><th class="tc"></th>`;
  for(let i=0;i<5;i++){
    const d=addDays(currentMonday,i);
    const td=isToday(d)?' today-th':'';
    html+=`<th class="${td}">${DAYS_SHORT[i]}<br>${fmtDisplay(d)}</th>`;
  }
  html+=`</tr>`;
  slots.forEach((m,si)=>{
    html+=`<tr><td class="time">${timeStr(m)}</td>`;
    for(let di=0;di<5;di++){
      const d=addDays(currentMonday,di);
      const tc=isToday(d)?' today-col':'';
      const key=slotKey(currentDespacho,di,si);
      const bk=bookings[key];
      if(isBlocked(currentDespacho,si)){
        html+=`<td class="blocked${tc}"></td>`;
      } else if(bk){
        const pi=profIndex(bk.prof);
        const c=PCOLORS[pi>=0?pi%PCOLORS.length:0];
        const prof=PROFESIONALES[pi>=0?pi:{codigo:bk.prof}];
        const codigo=prof?prof.codigo:bk.prof;
        html+=`<td class="booked${tc}" onclick="openEdit('${key}')">
          <span class="pill" style="background:${c.bg};color:${c.fg}">${codigo}: ${bk.persona}</span></td>`;
      } else {
        html+=`<td class="free${tc}" onclick="openNew('${key}','${timeStr(m)}')"></td>`;
      }
    }
    html+=`</tr>`;
  });
  t.innerHTML=html;
}
function render(){renderTabs();renderWeekLabel();renderGrid();}
async function setDespacho(id){currentDespacho=id;bookings={};render();await loadWeek();}
async function changeWeek(n){currentMonday=addDays(currentMonday,n*7);bookings={};render();await loadWeek();}
async function goToday(){currentMonday=getMonday(new Date());bookings={};render();await loadWeek();}

function profOptions(selected=''){
  return PROFESIONALES.map(p=>`<option value="${p.codigo}"${p.codigo===selected?' selected':''}>${p.codigo} — ${p.nombre}</option>`).join('');
}
function openNew(key,time){
  const parts=key.split('_');
  showModal(`
    <h3>Nueva cita</h3>
    <div class="modal-sub">Despacho ${currentDespacho} · ${parts[1]} · ${time} h (45 min)</div>
    <div class="fr"><label>Profesional</label><select id="m-prof">${profOptions()}</select></div>
    <div class="fr"><label>Persona atendida</label><input type="text" id="m-persona" placeholder="Nombre o referencia" autocomplete="off"></div>
    <div class="fr"><label>Observaciones (opcional)</label><textarea id="m-obs"></textarea></div>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="handleSaveNew('${key}')">Guardar cita</button>
    </div>`);
}
function openEdit(key){
  const bk=bookings[key];
  const parts=key.split('_');
  const hora=timeStr(START+parseInt(parts[2])*SLOT);
  showModal(`
    <h3>Editar cita</h3>
    <div class="modal-sub">Despacho ${currentDespacho} · ${parts[1]} · ${hora} h</div>
    <div class="fr"><label>Profesional</label><select id="m-prof">${profOptions(bk.prof)}</select></div>
    <div class="fr"><label>Persona atendida</label><input type="text" id="m-persona" value="${esc(bk.persona||'')}"></div>
    <div class="fr"><label>Observaciones</label><textarea id="m-obs">${esc(bk.obs||'')}</textarea></div>
    <div class="btn-row">
      <button class="btn btn-danger" onclick="handleDelete('${key}',${bk.rowIndex})">Eliminar</button>
      <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="handleUpdate('${key}',${bk.rowIndex})">Guardar</button>
    </div>`);
}
function handleSaveNew(key){
  const prof=document.getElementById('m-prof').value;
  const persona=document.getElementById('m-persona').value.trim();
  const obs=document.getElementById('m-obs').value.trim();
  if(!persona){document.getElementById('m-persona').style.borderColor='#a32d2d';return;}
  saveBooking(key,{prof,persona,obs});
}
function handleUpdate(key,id){
  const prof=document.getElementById('m-prof').value;
  const persona=document.getElementById('m-persona').value.trim();
  const obs=document.getElementById('m-obs').value.trim();
  if(!persona){document.getElementById('m-persona').style.borderColor='#a32d2d';return;}
  updateBooking(key,id,{prof,persona,obs});
}
function handleDelete(key,id){if(confirm('¿Eliminar esta cita?'))deleteBooking(key,id);}
function showModal(html){document.getElementById('modal-box').innerHTML=html;document.getElementById('overlay').style.display='flex';}
function closeModal(){document.getElementById('overlay').style.display='none';}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))closeModal();});
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function showError(msg){const b=document.getElementById('err-banner');b.textContent=msg;b.style.display='block';}
function hideError(){document.getElementById('err-banner').style.display='none';}
function esc(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

(async()=>{
  render();
  try{await loadWeek();}
  catch(e){showError('Error de conexión. '+e.message);loading=false;renderGrid();}
})();
</script>
</body>
</html>
